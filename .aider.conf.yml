# Dev Factory V2 — Model Configuration
# DeepSeek as main coder, Sonnet as architect

model: "openrouter/deepseek/deepseek-chat"

# Context management
map-tokens: 1024
map-multiplier-no-files: 2

# Auto-validation
auto-commits: true
auto-test: true
test-cmd: "npx vitest run 2>&1 | head -50"
lint-cmd: "npx tsc --noEmit 2>&1 | head -30"

# Autonomous mode
suggest-shell-commands: true
show-diffs: false
stream: false
yes-always: true
encoding: utf-8
